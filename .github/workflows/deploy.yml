name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.actions-deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # ---- Path A : push the built site to a `gh-pages` branch.
      # Works whenever Pages is in "Deploy from a branch" mode pointing at
      # `gh-pages`.
      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          commit_message: 'deploy: ${{ github.sha }}'

      # ---- Path B : try to switch Pages source to "GitHub Actions" mode and
      # publish via the official Pages deployment pipeline. Wrapped in
      # continue-on-error because this requires admin and may not be granted
      # to the default GITHUB_TOKEN — Path A will already have published.
      - name: Switch Pages source to Actions mode (best-effort)
        continue-on-error: true
        run: |
          curl -sS -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"build_type":"workflow"}'

      - name: Configure Pages
        continue-on-error: true
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        continue-on-error: true
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: actions-deploy
        continue-on-error: true
        uses: actions/deploy-pages@v4
